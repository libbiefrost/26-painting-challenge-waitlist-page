<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>26 Painting Challenge — Sign Up</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      min-height: 100vh;
      font-family: 'Inconsolata', monospace;
      /* Painting fills the full page, anchored toward the bottom */
      background: url('bridge-painting.png') no-repeat center 100% / cover;
      position: relative;
    }

    /* Gradient overlay: solid purple at top → transparent,
       blending into the painting's purple sky */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: linear-gradient(
        to bottom,
        #0d0a4a 0%,
        #1a1268 20%,
        #2e1a7a 33%,
        rgba(74, 45, 150, 0.72) 44%,
        rgba(100, 70, 160, 0.35) 52%,
        rgba(123, 103, 168, 0.0) 62%
      );
      pointer-events: none;
      z-index: 1;
    }

    /* ── Layout ─────────────────────────────────────── */
    .page {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 52px 24px 48px;
    }

    /* ── Countdown ───────────────────────────────────── */
    .countdown-wrapper {
      text-align: center;
      margin-bottom: 36px;
    }

    .countdown-label {
      color: rgba(255, 255, 255, 0.75);
      font-size: 0.78rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .countdown {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .countdown-unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 56px;
    }

    .countdown-number {
      font-size: clamp(2.4rem, 8vw, 3.6rem);
      font-weight: 700;
      color: #ffffff;
      line-height: 1;
      font-family: 'Inconsolata', monospace;
      text-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }

    .countdown-unit-label {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.65);
      margin-top: 6px;
    }

    .countdown-sep {
      font-size: clamp(2rem, 7vw, 3rem);
      color: rgba(255,255,255,0.4);
      line-height: 1;
      align-self: flex-start;
      padding-top: 4px;
    }

    .countdown-event {
      margin-top: 14px;
      color: rgba(255, 255, 255, 0.6);
      font-size: 0.72rem;
      letter-spacing: 0.12em;
    }

    /* ── Divider ─────────────────────────────────────── */
    .divider {
      width: 48px;
      height: 1px;
      background: rgba(255,255,255,0.3);
      margin: 0 auto 28px;
    }

    /* ── Signup Form ─────────────────────────────────── */
    .signup-heading {
      color: #ffffff;
      font-size: clamp(0.9rem, 3.5vw, 1.05rem);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 22px;
      font-weight: normal;
    }

    form {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .field-row {
      display: flex;
      gap: 12px;
    }

    .field-row input {
      flex: 1;
      min-width: 0;
    }

    input[type="text"],
    input[type="email"] {
      width: 100%;
      padding: 13px 16px;
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.12);
      color: #ffffff;
      font-size: 0.9rem;
      font-family: inherit;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      transition: border-color 0.2s, background 0.2s;
      outline: none;
    }

    input[type="text"]::placeholder,
    input[type="email"]::placeholder {
      color: rgba(255, 255, 255, 0.5);
    }

    input[type="text"]:focus,
    input[type="email"]:focus {
      border-color: rgba(255, 255, 255, 0.7);
      background: rgba(255, 255, 255, 0.18);
    }

    button[type="submit"] {
      width: 100%;
      padding: 14px;
      background: #ffffff;
      color: #1a1268;
      font-size: 0.82rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-family: inherit;
      font-weight: 700;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin-top: 4px;
      transition: background 0.2s, color 0.2s, opacity 0.2s;
    }

    button[type="submit"]:hover {
      background: #f0eaf9;
    }

    button[type="submit"]:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* ── Status messages ─────────────────────────────── */
    #form-status {
      text-align: center;
      font-size: 0.82rem;
      letter-spacing: 0.06em;
      min-height: 1.2em;
      color: rgba(255,255,255,0.85);
      margin-top: 4px;
    }

    #form-status.error {
      color: #ffb3b3;
    }

    /* ── Mobile tweaks ───────────────────────────────── */
    @media (max-width: 480px) {
      .field-row {
        flex-direction: column;
      }

      .page {
        padding: 40px 20px 40px;
      }
    }
  </style>
</head>
<body>

<div class="page">

  <!-- Countdown -->
  <div class="countdown-wrapper">
    <p class="countdown-label">Opens in</p>
    <div class="countdown">
      <div class="countdown-unit">
        <span class="countdown-number" id="cd-days">--</span>
        <span class="countdown-unit-label">Days</span>
      </div>
      <span class="countdown-sep">:</span>
      <div class="countdown-unit">
        <span class="countdown-number" id="cd-hours">--</span>
        <span class="countdown-unit-label">Hours</span>
      </div>
      <span class="countdown-sep">:</span>
      <div class="countdown-unit">
        <span class="countdown-number" id="cd-minutes">--</span>
        <span class="countdown-unit-label">Minutes</span>
      </div>
      <span class="countdown-sep">:</span>
      <div class="countdown-unit">
        <span class="countdown-number" id="cd-seconds">--</span>
        <span class="countdown-unit-label">Seconds</span>
      </div>
    </div>
    <p class="countdown-event">Saturday, April 12 · 9am CT&nbsp;/&nbsp;10am ET</p>
  </div>

  <div class="divider"></div>

  <!-- Signup form -->
  <h2 class="signup-heading">Sign Up to Be Notified</h2>

  <form id="signup-form" novalidate>
    <div class="field-row">
      <input type="text" name="firstName" placeholder="First Name" required />
      <input type="text" name="lastName"  placeholder="Last Name"  required />
    </div>
    <input type="email" name="email" placeholder="Email Address" required />
    <button type="submit" id="submit-btn">Notify Me</button>
    <p id="form-status"></p>
  </form>

</div>

<script>
  /* ── Countdown ─────────────────────────────────────── */
  // April 12 2026, 9:00 AM CDT = 14:00 UTC
  const TARGET = new Date('2026-04-12T14:00:00Z').getTime();

  function pad(n) { return String(n).padStart(2, '0'); }

  function tick() {
    const now  = Date.now();
    const diff = TARGET - now;

    if (diff <= 0) {
      document.getElementById('cd-days').textContent    = '00';
      document.getElementById('cd-hours').textContent   = '00';
      document.getElementById('cd-minutes').textContent = '00';
      document.getElementById('cd-seconds').textContent = '00';
      return;
    }

    const days    = Math.floor(diff / 86400000);
    const hours   = Math.floor((diff % 86400000) / 3600000);
    const minutes = Math.floor((diff % 3600000)  / 60000);
    const seconds = Math.floor((diff % 60000)    / 1000);

    document.getElementById('cd-days').textContent    = pad(days);
    document.getElementById('cd-hours').textContent   = pad(hours);
    document.getElementById('cd-minutes').textContent = pad(minutes);
    document.getElementById('cd-seconds').textContent = pad(seconds);
  }

  tick();
  setInterval(tick, 1000);

  /* ── Form submission ───────────────────────────────── */
  // Paste your deployed Google Apps Script URL here:
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxbIpfaXY_BUwgn44dXKHjdxLYzobJOi3qXAVhnQbUiQc9E9b3eL5WH2WM5OYbjvIl0XA/exec';

  const form      = document.getElementById('signup-form');
  const statusEl  = document.getElementById('form-status');
  const submitBtn = document.getElementById('submit-btn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    statusEl.className = '';
    statusEl.textContent = '';

    const firstName = form.firstName.value.trim();
    const lastName  = form.lastName.value.trim();
    const email     = form.email.value.trim();

    if (!firstName || !lastName || !email) {
      statusEl.className = 'error';
      statusEl.textContent = 'Please fill in all fields.';
      return;
    }

    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      statusEl.className = 'error';
      statusEl.textContent = 'Please enter a valid email address.';
      return;
    }

    if (APPS_SCRIPT_URL === 'YOUR_APPS_SCRIPT_URL_HERE') {
      statusEl.className = 'error';
      statusEl.textContent = 'Form not yet connected — see setup instructions.';
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Sending…';

    try {
      const params = new URLSearchParams({ firstName, lastName, email });
      await fetch(APPS_SCRIPT_URL + '?' + params.toString(), {
        method: 'GET',
        mode: 'no-cors',
      });
      // no-cors means we can't read the response body, so assume success
      form.reset();
      statusEl.textContent = "You're on the list! We'll be in touch.";
      submitBtn.textContent = 'Done';
    } catch (err) {
      statusEl.className = 'error';
      statusEl.textContent = 'Something went wrong. Please try again.';
      submitBtn.disabled = false;
      submitBtn.textContent = 'Notify Me';
    }
  });
</script>

</body>
</html>
